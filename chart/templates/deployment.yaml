apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "s3-watcher.fullname" . }}
  labels:
    {{- include "s3-watcher.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "s3-watcher.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "s3-watcher.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "s3-watcher.serviceAccountName" . }}
      containers:
        - name: watcher
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          env:
            - name: AWS_REGION
              value: {{ .Values.aws.region | quote }}
            - name: S3_BUCKET_NAME
              value: {{ .Values.s3.bucketName | quote }}
            - name: S3_PREFIX
              value: {{ .Values.s3.prefix | quote }}
            - name: POLL_INTERVAL_SECONDS
              value: {{ .Values.s3.pollIntervalSeconds | quote }}
            - name: AWS_ACCESS_KEY_ID
              valueFrom:
                secretKeyRef:
                  name: {{ include "s3-watcher.secretName" . }}
                  key: aws-access-key-id
            - name: AWS_SECRET_ACCESS_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ include "s3-watcher.secretName" . }}
                  key: aws-secret-access-key
            - name: CHATKEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: CHATKEY
                  optional: true
            - name: TEST_LOCAL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.credentials.existingSecret | quote }}
                  key: TEST_LOCAL
                  optional: true
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          {{- with .Values.extraVolumeMounts }}
          volumeMounts:
            {{- toYaml . | nindent 12 }}
          {{- end }}
      {{- with .Values.extraVolumes }}
      volumes:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
