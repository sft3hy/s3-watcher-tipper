{{- if and .Values.clickhouse.enabled .Values.ingestionJob.enabled }}
apiVersion: batch/v1
kind: Job
metadata:
  name: {{ include "s3-watcher.fullname" . }}-ingest-init
  labels:
    app: {{ include "s3-watcher.fullname" . }}-ingest
spec:
  template:
    metadata:
      name: ingest-init
    spec:
      restartPolicy: OnFailure
      containers:
      - name: ingest
        image: clickhouse/clickhouse-server:latest
        resources:
          {{- toYaml .Values.ingestionJob.resources | nindent 12 }}
        env:
        - name: CLICKHOUSE_HOST
          value: {{ include "s3-watcher.fullname" . }}-clickhouse
        - name: AWS_REGION
          value: {{ .Values.aws.region | quote }}
        - name: S3_BUCKET_NAME
          value: {{ .Values.s3.bucketName | quote }}
        - name: S3_PREFIX
          value: {{ .Values.s3.prefix | quote }}
        - name: AWS_ACCESS_KEY_ID
          valueFrom:
            secretKeyRef:
              name: {{ include "s3-watcher.secretName" . }}
              key: aws-access-key-id
        - name: AWS_SECRET_ACCESS_KEY
          valueFrom:
            secretKeyRef:
              name: {{ include "s3-watcher.secretName" . }}
              key: aws-secret-access-key
        - name: CLICKHOUSE_USER
          value: {{ .Values.clickhouse.user | quote }}
        - name: CLICKHOUSE_PASSWORD
          value: {{ .Values.clickhouse.password | quote }}
        command:
        - /bin/sh
        - -c
        - |
          while ! clickhouse-client --host $CLICKHOUSE_HOST --user $CLICKHOUSE_USER --password $CLICKHOUSE_PASSWORD --query "SELECT 1" > /dev/null 2>&1; do
            echo "Waiting for ClickHouse to start..."
            sleep 5
          done
          
          echo "ClickHouse ready. Starting S3 bulk ingestion..."
          S3_URI="s3://${S3_BUCKET_NAME}/${S3_PREFIX}**/*.parquet"
          
          # We use clickhouse native S3 credentials (inherited by the server process)
          # We force a DROP and recreation to ensure the schema is refreshed from all files in S3.
          # We also add schema_inference_hints to ensure Skytrace-specific columns are included.
          clickhouse-client --host $CLICKHOUSE_HOST --user $CLICKHOUSE_USER --password $CLICKHOUSE_PASSWORD --query="
            DROP TABLE IF EXISTS sigint_data;
            SET schema_inference_make_columns_nullable=1;
            SET use_hive_partitioning = 1;
            SET input_format_hive_partitioning_ignore_errors = 1;
            SET schema_inference_hints='isp_name String, connection_type String, satellite_provider String, vpn_detected String, ip_geo_country String, ip_geo_city String, entity_id String, event_time DateTime64(3), device_brand String, device_model String, carrier String, wifi_ssid String, entity_type String, entity_age Int32';
            CREATE TABLE sigint_data  
            ENGINE = MergeTree 
            ORDER BY tuple() 
            AS SELECT * FROM s3('${S3_URI}', '${AWS_ACCESS_KEY_ID}', '${AWS_SECRET_ACCESS_KEY}', 'Parquet')
          "
          
          echo "S3 Bulk ingestion complete."
{{- end }}
