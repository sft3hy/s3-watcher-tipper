<div id="page-api" class="page">
    <div class="card" style="margin-bottom:20px">
        <div class="card-title">⊞ API v1 — External Integration</div>
        <div style="color:var(--muted);font-family:var(--font-mono);font-size:11px;line-height:1.8">
            <p style="margin-bottom:10px;color:var(--text)">All endpoints return JSON. Base path: <code
                    style="color:var(--glow)">/s3-watcher/api/v1</code></p>
            <div id="api-key-status" style="margin-bottom:12px"></div>
            <table class="assoc-table" id="api-endpoints-table">
                <thead>
                    <tr>
                        <th>Method</th>
                        <th>Endpoint</th>
                        <th>Description</th>
                        <th>Test</th>
                    </tr>
                </thead>
                <tbody></tbody>
            </table>
        </div>
    </div>
    <div class="card">
        <div class="card-title">⊞ Live API Response</div>
        <pre id="api-response"
            style="background:#050a0e;border:1px solid var(--border);padding:14px;font-family:var(--font-mono);font-size:11px;color:var(--glow);max-height:400px;overflow:auto;white-space:pre-wrap">Click "Test" on any endpoint above to see the response here.</pre>
    </div>
</div>
